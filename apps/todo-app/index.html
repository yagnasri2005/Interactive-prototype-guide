<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-tasks"></i> My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <!-- Theme Toggle -->
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <i class="fas fa-moon"></i>
        </button>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="taskInput" 
                    class="task-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                    maxlength="100"
                >
                <button id="addBtn" class="add-btn" aria-label="Add new task">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div class="input-hints">
                <small>Press <kbd>Enter</kbd> to add task</small>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="stats">
            <div class="stat">
                <span class="stat-label">Total Tasks:</span>
                <span class="stat-value" id="totalTasks">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Completed:</span>
                <span class="stat-value" id="completedTasks">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Remaining:</span>
                <span class="stat-value" id="remainingTasks">0</span>
            </div>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-list"></i> All
            </button>
            <button class="filter-btn" data-filter="active">
                <i class="fas fa-circle-notch"></i> Active
            </button>
            <button class="filter-btn" data-filter="completed">
                <i class="fas fa-check-circle"></i> Completed
            </button>
        </div>

        <!-- Task List -->
        <div class="task-list-container">
            <ul id="taskList" class="task-list">
                <!-- Tasks will be added here dynamically -->
            </ul>
            
            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-inbox"></i>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button id="clearCompletedBtn" class="action-btn secondary" aria-label="Clear completed tasks">
                <i class="fas fa-trash-alt"></i> Clear Completed
            </button>
            <button id="clearAllBtn" class="action-btn danger" aria-label="Clear all tasks">
                <i class="fas fa-broom"></i> Clear All
            </button>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Local storage enabled • Data automatically saved</p>
        </footer>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Confirm Action</h2>
            <p id="confirmMessage">Are you sure?</p>
            <div class="modal-buttons">
                <button id="confirmBtn" class="btn-primary">Confirm</button>
                <button id="cancelBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="notification" style="display: none;"></div>

    <script src="script.js"></script>
</body>
</html>
